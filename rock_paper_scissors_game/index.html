<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Rock Paper Scissors </h1>
    <div id="choices">
        <div class="choices" id="Rock">
            <img src="images/Rock.jpg" alt="Rock">
        </div>
        <div class="choices" id="Paper">
            <img src="images/Paper.jpg" alt="Paper">
        </div>
        <div class="choices" id="Scissors">
            <img src="images/Scissor.jpg" alt="Scissors">
        </div>

    </div>
    <div id="score">
        <div id="you">
            <p id="yourScore">0</p>
            <h3>You</h3>
        </div>
        <div id="comp">
            <p id="compScore">0</p>
            <h3>Comp</h3>
        </div>
    </div>
    <div id="msgContainer">
        <p id="msgArea">Play your move</p>
    </div>
    <script src="script.js"></script>
</body>

</html>
